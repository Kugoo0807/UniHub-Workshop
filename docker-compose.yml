version: '3.8'

services:
  # --- Cache / Lock Redis ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - unihub-network

  # --- AI Microservice ---
  ai-service:
    build: ./ai-service
    env_file:
      - .env.production
    networks:
      - unihub-network

  # --- Spring Boot Backend ---
  backend:
    build: ./backend
    env_file:
      - .env.production
    depends_on:
      - redis
    networks:
      - unihub-network

  # --- React Frontend + Nginx Reverse Proxy ---
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - unihub-network

volumes:
  pgdata:

networks:
  unihub-network:
    driver: bridge